<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEO RNG | </title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ================= 二维主题系统引擎 (3套色系 x 深浅模式) ================= */
        :root {
            --border-width: 2.5px; --radius-sm: 12px; --radius-lg: 28px; --radius-pill: 100px;
            --shadow: 3px 3px 0px var(--shadow-main); --shadow-hover: 5px 5px 0px var(--shadow-main); --shadow-active: 0px 0px 0px var(--shadow-main);
            --font-main: 'Space Grotesk', system-ui, sans-serif; --font-mono: 'JetBrains Mono', 'Courier New', monospace;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* 1. ⚡ 赛博酸性 (Cyber) */
        body[data-theme="cyber"] {
            --bg-color: #F4F5F5; --card-bg: #FFFFFF; --text-main: #141414; --border-main: #141414;
            --accent-main: #D4FF00; --accent-sub: #B28DFF; --btn-text: #141414;
            --gray-light: #E0E2E5; --text-muted: #666666; --shadow-main: #141414;
        }
        body[data-theme="cyber"].dark-theme {
            --bg-color: #121212; --card-bg: #1C1C1C; --text-main: #E4E4E4; --border-main: #3A3A3A;
            --accent-main: #D4FF00; --accent-sub: #B28DFF; --btn-text: #141414;
            --gray-light: #2A2A2A; --text-muted: #888888; --shadow-main: #000000;
        }

        /* 2. 📻 复古印刷 (Retro) */
        body[data-theme="retro"] {
            --bg-color: #EFE9E1; --card-bg: #FAFAFA; --text-main: #2C2A29; --border-main: #2C2A29;
            --accent-main: #FF7B54; --accent-sub: #4ECDC4; --btn-text: #FAFAFA;
            --gray-light: #DFD8CE; --text-muted: #7A7571; --shadow-main: #2C2A29;
        }
        body[data-theme="retro"].dark-theme {
            --bg-color: #2A2421; --card-bg: #352E2B; --text-main: #EFE9E1; --border-main: #5A4E49;
            --accent-main: #FF7B54; --accent-sub: #4ECDC4; --btn-text: #2A2421;
            --gray-light: #3D3531; --text-muted: #9E8F87; --shadow-main: #000000;
        }

        /* 3. 🍵 柔和薄荷 (Pastel) */
        body[data-theme="pastel"] {
            --bg-color: #F0F4F8; --card-bg: #FFFFFF; --text-main: #2D3748; --border-main: #2D3748;
            --accent-main: #9DECF9; --accent-sub: #FBB6CE; --btn-text: #2D3748;
            --gray-light: #E2E8F0; --text-muted: #718096; --shadow-main: #2D3748;
        }
        body[data-theme="pastel"].dark-theme {
            --bg-color: #1A202C; --card-bg: #2D3748; --text-main: #F0F4F8; --border-main: #4A5568;
            --accent-main: #9DECF9; --accent-sub: #FBB6CE; --btn-text: #1A202C;
            --gray-light: #2A3441; --text-muted: #A0AEC0; --shadow-main: #000000;
        }

        body.emergency-mode { animation: redAlert 0.8s infinite alternate; }
        @keyframes redAlert { from { background-color: #220000; } to { background-color: #FF0000; } }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-main);
            min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
            background-image: radial-gradient(var(--gray-light) 1.5px, transparent 1.5px); 
            background-size: 24px 24px;
        }

        body::after {
            content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; opacity: 0.05; mix-blend-mode: multiply;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        body.dark-theme::after { opacity: 0.08; mix-blend-mode: overlay; }

        /* ----- Header ----- */
        header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; gap: 10px; flex-wrap: wrap; }
        h1 { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; margin: 0; transition: color 0.3s; white-space: nowrap;}
        .header-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap;}
        
        .icon-btn { background: var(--card-bg); border: var(--border-width) solid var(--border-main); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; box-shadow: 2px 2px 0 var(--shadow-main); color: var(--text-main); transition: all 0.2s; flex-shrink: 0;}
        .icon-btn:active { box-shadow: 0px 0px 0 var(--shadow-main); transform: translate(2px, 2px); }

        .status-badge { display: flex; align-items: center; gap: 8px; padding: 6px 14px; background: var(--card-bg); border: var(--border-width) solid var(--border-main); border-radius: var(--radius-pill); font-weight: 700; font-size: 12px; box-shadow: 2px 2px 0px var(--shadow-main); cursor: pointer; transition: all 0.2s; white-space: nowrap; color: var(--text-main); flex-shrink: 0;}
        .status-badge:active { box-shadow: 0px 0px 0px var(--shadow-main); transform: translate(2px, 2px); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent-main); border: 2px solid var(--border-main); transition: background 0.3s;}

        @media (max-width: 480px) { header { padding: 12px 16px; } h1 { font-size: 20px; } .header-controls { gap: 6px; } .icon-btn { width: 32px; height: 32px; font-size: 14px; } .status-badge { padding: 6px 10px; font-size: 11px; } }

        .container { display: flex; flex: 1; flex-direction: column; max-width: 1100px; margin: 0 auto; width: 100%; padding: 0 16px 40px; gap: 24px; }
        @media (min-width: 900px) { .container { flex-direction: row; align-items: flex-start; padding: 0 20px 40px;} .main-content { flex: 1.5; } .sidebar { flex: 1; position: sticky; top: 20px; } }

        /* ----- Main Content & Tabs ----- */
        .main-content { display: flex; flex-direction: column; gap: 20px; touch-action: pan-y; }
        
        .tabs-container { display: flex; background: var(--card-bg); border: var(--border-width) solid var(--border-main); border-radius: var(--radius-pill); padding: 6px; box-shadow: var(--shadow); overflow-x: auto; -ms-overflow-style: none; scrollbar-width: none; scroll-snap-type: x mandatory; transition: all 0.3s; }
        .tab-btn { flex: 1; background: transparent; border: none; padding: 12px 16px; font-size: 14px; font-weight: 900; border-radius: var(--radius-pill); cursor: pointer; transition: all 0.2s; color: var(--text-muted); scroll-snap-align: start; text-align: center; white-space: nowrap; }
        .tab-btn.active { background: var(--accent-main); color: var(--btn-text); border: var(--border-width) solid var(--border-main); box-shadow: 2px 2px 0 var(--shadow-main); }

        /* ----- Cards & UI Components ----- */
        .card { background: var(--card-bg); border: var(--border-width) solid var(--border-main); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow); display: none; animation: fadeIn 0.3s ease-out; transition: background 0.3s, border-color 0.3s; }
        @media (min-width: 768px) { .card { padding: 32px; } }
        .card.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .label-row { display: flex; justify-content: space-between; align-items: center; }
        label { font-weight: 900; font-size: 13px; display: flex; align-items: center; gap: 8px; color: var(--text-main); transition: color 0.3s;}
        .badge-small { background: var(--accent-main); color: var(--btn-text); padding: 2px 8px; border-radius: var(--radius-pill); border: 1.5px solid var(--border-main); font-size: 10px; white-space: nowrap; transition: all 0.3s;}

        .brutal-checkbox { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 12px; font-weight: 700; color: var(--text-muted); }
        .brutal-checkbox input { appearance: none; width: 16px; height: 16px; border: 2px solid var(--text-muted); border-radius: 4px; background: var(--bg-color); cursor: pointer; transition: all 0.1s; position: relative; }
        .brutal-checkbox input:checked { background: var(--text-main); border-color: var(--text-main); }
        .brutal-checkbox input:checked::after { content: '✔'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--bg-color); font-size: 10px; font-weight: 900; }

        input[type="text"], input[type="number"], textarea {
            width: 100%; padding: 14px 20px; border: var(--border-width) solid var(--border-main); border-radius: var(--radius-sm);
            font-size: 16px; font-weight: 700; background: var(--bg-color); outline: none; transition: all 0.2s; font-family: var(--font-main); color: var(--text-main);
        }
        input:focus, textarea:focus { background: var(--card-bg); box-shadow: 3px 3px 0 var(--shadow-main); transform: translate(-2px, -2px); border-width: 3px; }
        
        .btn-action { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; background: var(--accent-main); color: var(--btn-text); border: var(--border-width) solid var(--border-main); border-radius: var(--radius-pill); padding: 16px; font-size: 16px; font-weight: 900; cursor: pointer; box-shadow: var(--shadow); transition: all 0.2s; }
        .btn-action:hover { transform: translate(-2px, -2px); box-shadow: var(--shadow-hover); }
        .btn-action:active { transform: translate(3px, 3px); box-shadow: var(--shadow-active); }
        .btn-action:disabled { background: var(--gray-light); color: var(--text-muted); cursor: not-allowed; box-shadow: 0 0 0 transparent; transform: translate(3px,3px); }

        /* ----- Modules ----- */
        .coin-wrapper { display: flex; flex-direction: column; align-items: center; }
        .coin-inputs { display: flex; flex-direction: column; gap: 15px; width: 100%; margin-bottom: 10px; }
        @media (min-width: 600px) { .coin-inputs { flex-direction: row; } }
        .coin-scene { width: 150px; height: 150px; perspective: 1200px; cursor: pointer; margin: 40px 0; }
        .coin { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; }
        .coin-face { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: var(--border-width) solid var(--border-main); backface-visibility: hidden; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 24px; font-weight: 900; padding: 10px; word-break: break-all; box-shadow: inset 0 0 0 6px var(--bg-color); transition: all 0.3s;}
        .coin-front { background: var(--card-bg); color: var(--text-main); transform: translateZ(8px); }
        .coin-back { background: var(--accent-main); color: var(--btn-text); transform: rotateY(180deg) translateZ(8px); }
        .coin-edge-layer { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: var(--card-bg); border: 2px solid var(--border-main); transition: all 0.3s;}
        .coin-shadow { width: 120px; height: 16px; background: var(--border-main); opacity: 0.15; border-radius: 50%; margin-top: -20px; margin-bottom: 40px; filter: blur(3px); transition: all 0.2s; }
        body.dark-theme .coin-shadow { opacity: 0.4; filter: blur(6px); }

        .rng-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; margin-bottom: 16px; }
        .rng-controls-row { display: flex; justify-content: flex-end; margin-bottom: 20px; } 
        .rng-results { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 24px; }
        .rng-number { background: var(--card-bg); border: var(--border-width) solid var(--border-main); border-radius: var(--radius-pill); padding: 10px 20px; font-size: 20px; font-weight: 900; box-shadow: 2px 2px 0 var(--shadow-main); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: var(--text-main); transition: all 0.3s; font-variant-numeric: tabular-nums; }

        .wheel-layout { display: flex; flex-direction: column; gap: 30px; width: 100%; }
        .wheel-render { display: flex; justify-content: center; align-items: center; width: 100%; padding: 10px 0; position: relative; }
        .wheel-setup { display: flex; flex-direction: column; gap: 12px; }
        .wheel-setup textarea { height: 180px; resize: none; line-height: 1.8; font-size: 15px;}
        
        @media(min-width: 768px) { 
            .wheel-layout { flex-direction: row; align-items: stretch; } 
            .wheel-render { flex: 1.2; } 
            .wheel-setup { flex: 1; justify-content: center;} 
            .wheel-setup textarea { height: 100%; min-height: 250px; }
        }

        .wheel-box { position: relative; width: 320px; max-width: 100%; aspect-ratio: 1/1; height: auto; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 20px rgba(0,0,0,0.05); transition: box-shadow 0.3s; }
        body.dark-theme #wheelCanvas { box-shadow: 0 0 30px rgba(0,0,0,0.3); }
        .wheel-center-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 72px; height: 72px; border-radius: 50%; background: var(--card-bg); border: var(--border-width) solid var(--border-main); font-weight: 900; font-size: 16px; cursor: pointer; box-shadow: 3px 3px 0 var(--shadow-main); display: flex; align-items: center; justify-content: center; z-index: 5; transition: all 0.1s; color: var(--text-main); }
        .wheel-center-btn:active { transform: translate(-48%, -48%); box-shadow: 0px 0px 0 var(--shadow-main); }
        .wheel-pointer { position: absolute; top: 50%; right: -2px; transform: translateY(-50%); width: 0; height: 0; border-top: 14px solid transparent; border-bottom: 14px solid transparent; border-right: 24px solid var(--border-main); z-index: 6; filter: drop-shadow(2px 2px 0px var(--card-bg)); transition: all 0.3s;}

        .wheel-result-stamp {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-6deg) scale(0);
            background: var(--text-main); color: var(--bg-color); border: var(--border-width) solid var(--border-main);
            padding: 16px 32px; font-size: 26px; font-weight: 900; border-radius: var(--radius-sm);
            box-shadow: 6px 6px 0px var(--shadow-main); z-index: 20; opacity: 0; pointer-events: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap; max-width: 90%; overflow: hidden; text-overflow: ellipsis; text-align: center;
        }
        .wheel-result-stamp.show { transform: translate(-50%, -50%) rotate(-6deg) scale(1); opacity: 1; }

        /* ----- Receipt Sidebar ----- */
        .receipt-wrapper { position: relative; min-height: 400px; display: flex; flex-direction: column; flex: 1; }
        .receipt-tear-box { position: relative; width: 100%; flex: 1; display: flex; flex-direction: column; transform-origin: top center; z-index: 5; }
        .receipt-tear-box.tearing { animation: tearOff 0.8s forwards ease-in; }
        @keyframes tearOff { 0% { transform: translateY(0) rotateZ(0deg); opacity: 1; } 40% { transform: translateY(30px) rotateZ(2deg); opacity: 1; filter: drop-shadow(10px 10px 0px var(--shadow-main)); } 100% { transform: translateY(500px) rotateZ(-10deg); opacity: 0; } }

        .receipt-inner { position: relative; width: 100%; flex: 1; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
        .receipt-inner.flipped { transform: rotateY(180deg); }
        
        .receipt-front, .receipt-back { background: var(--card-bg); border: var(--border-width) solid var(--border-main); border-radius: var(--radius-sm); box-shadow: var(--shadow); padding: 24px 20px; position: absolute; top: 0; left: 0; width: 100%; height: 100%; font-family: var(--font-mono); display: flex; flex-direction: column; backface-visibility: hidden; transition: all 0.3s; }
        .receipt-front { position: relative; z-index: 2; }
        .receipt-back { transform: rotateY(180deg); background: var(--text-main); color: var(--bg-color); }
        
        .receipt-front::before, .receipt-back::before { content: ""; position: absolute; top: -6px; left: 0; right: 0; height: 6px; background-size: 12px 100%; background-image: linear-gradient(135deg, transparent 25%, var(--border-main) 25%, var(--border-main) 50%, transparent 50%, transparent 75%, var(--border-main) 75%, var(--border-main) 100%); clip-path: polygon(0 100%, 100% 100%, 100% 100%, 0 100%); transition: all 0.3s;}
        .receipt-back::before { background-image: linear-gradient(135deg, transparent 25%, var(--text-main) 25%, var(--text-main) 50%, transparent 50%, transparent 75%, var(--text-main) 75%, var(--text-main) 100%); }

        .receipt-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; border-bottom: 2px dashed var(--text-muted); padding-bottom: 15px; }
        .receipt-title-box { text-align: center; flex: 1; }
        .receipt-icon { font-size: 32px; margin-bottom: 10px; }
        .receipt-title { font-family: var(--font-main); font-weight: 900; font-size: 18px; letter-spacing: 1px; color: var(--text-main);}
        .receipt-back .receipt-title { color: var(--bg-color); }
        .receipt-sub { font-size: 12px; color: var(--text-muted); margin-top: 5px; transition: color 0.3s;}
        
        .receipt-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-right: 5px; -ms-overflow-style: none; scrollbar-width: none; }
        .receipt-item { display: flex; flex-direction: column; font-size: 13px; animation: slideIn 0.3s ease-out; position: relative; }
        .receipt-item::after { content: ''; display: block; width: 100%; border-bottom: 1px dashed var(--text-muted); margin-top: 15px; opacity: 0.3; }
        .receipt-row { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: flex-start; }
        .receipt-label { color: var(--text-muted); transition: color 0.3s;}
        .receipt-val { font-weight: 700; text-align: right; max-width: 60%; word-break: break-all; color: var(--text-main); transition: color 0.3s; font-variant-numeric: tabular-nums;}
        
        .receipt-footer { margin-top: 20px; padding-top: 15px; border-top: 2px dashed var(--text-muted); text-align: center; transition: all 0.3s;}
        .barcode { font-family: 'Libre Barcode 39', monospace; font-size: 40px; line-height: 1; letter-spacing: -2px; color: var(--border-main); background: repeating-linear-gradient(90deg, var(--border-main) 0, var(--border-main) 2px, transparent 2px, transparent 4px, var(--border-main) 4px, var(--border-main) 5px, transparent 5px, transparent 8px); height: 40px; width: 80%; margin: 0 auto 10px; transition: all 0.3s;}
        .receipt-back .barcode { color: var(--bg-color); background: repeating-linear-gradient(90deg, var(--bg-color) 0, var(--bg-color) 2px, transparent 2px, transparent 4px, var(--bg-color) 4px, var(--bg-color) 5px, transparent 5px, transparent 8px); }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; z-index: 10; }
        .ghost-btn { flex: 1; background: var(--card-bg); border: 2px dashed var(--border-main); border-radius: var(--radius-sm); padding: 12px; font-weight: 900; cursor: pointer; color: var(--text-muted); transition: all 0.2s; font-family: var(--font-main); }
        .ghost-btn:hover { background: var(--border-main); color: var(--bg-color); border-style: solid; }

        /* Stats Bars */
        .stat-section { margin-bottom: 20px; color: var(--bg-color); }
        .stat-section h4 { font-family: var(--font-main); font-weight: 900; margin-bottom: 10px; border-bottom: 1px solid var(--bg-color); padding-bottom: 5px; }
        .stat-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 12px; font-weight: 700; }
        .stat-bar-label { width: 45px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .stat-bar-track { flex: 1; height: 12px; background: rgba(255,255,255,0.2); border-radius: 6px; overflow: hidden; }
        body.dark-theme .stat-bar-track { background: rgba(0,0,0,0.3); }
        .stat-bar-fill { height: 100%; background: var(--bg-color); transition: width 1s ease-out; width: 0%; }
        .stat-bar-val { width: 30px; text-align: left; font-variant-numeric: tabular-nums;}

        /* ----- Toast ----- */
        #toast { position: fixed; top: 20px; left: 50%; transform: translate(-50%, -150px); background: var(--text-main); color: var(--bg-color); padding: 16px 24px; border-radius: var(--radius-pill); box-shadow: var(--shadow); font-weight: 700; font-size: 14px; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s, color 0.3s; z-index: 9999; display: flex; align-items: center; gap: 12px; white-space: nowrap;}
        #toast.show { transform: translate(-50%, 0); }
        .toast-action { background: var(--accent-main); color: var(--btn-text); border: none; border-radius: var(--radius-pill); padding: 6px 12px; font-weight: 900; font-family: var(--font-main); cursor: pointer; transition: all 0.3s;}

        .confetti-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9000; overflow: hidden; }
        .particle { position: absolute; border: 2px solid var(--border-main); }
        .shape-circle { border-radius: 50%; }
    </style>
</head>
<body data-theme="cyber">

    <header>
        <h1>NEO_RNG</h1>
        <div class="header-controls">
            <button class="icon-btn" id="themeBtn" onclick="cycleTheme()" title="🎨 切换主题色系">🎨</button>
            <button class="icon-btn" onclick="toggleDarkMode()" title="🌓 切换深浅模式">🌓</button>
            <button class="icon-btn" id="muteBtn" onclick="toggleMute()" title="🔔 切换静音模式">🔔</button>
            <!-- 核心优化：真伪随机三态切换器 -->
            <div class="status-badge" id="modeBtn" onclick="toggleMode()">
                <div class="status-dot" id="modeDot"></div>
                <span id="modeText">RANDOM.ORG</span>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="main-content" id="swipeArea">
            <div class="tabs-container">
                <button class="tab-btn active" onclick="switchTab('coin', 0, this)">🪙 Coin</button>
                <button class="tab-btn" onclick="switchTab('rng', 1, this)">🔢 Generator</button>
                <button class="tab-btn" onclick="switchTab('wheel', 2, this)">🎡 Wheel</button>
            </div>

            <!-- COIN MODULE -->
            <div id="coinTab" class="card active">
                <div class="coin-wrapper">
                    <div class="coin-inputs">
                        <div class="input-group"><label>HEADS <span class="badge-small">正面</span></label><input type="text" id="coinHeadInput" oninput="updateCoinText(); saveData();"></div>
                        <div class="input-group"><label>TAILS <span class="badge-small">反面</span></label><input type="text" id="coinTailInput" oninput="updateCoinText(); saveData();"></div>
                    </div>
                    <div class="coin-scene" onclick="executeCoinFlip()"><div class="coin" id="coinElement"><div class="coin-face coin-front" id="coinFrontText">YES</div><div class="coin-face coin-back" id="coinBackText">NO</div></div></div>
                    <div class="coin-shadow" id="coinShadow"></div>
                    <button class="btn-action" id="coinBtn" onclick="executeCoinFlip()">FLIP COIN</button>
                </div>
            </div>

            <!-- RNG MODULE -->
            <div id="rngTab" class="card">
                <div class="rng-grid">
                    <div class="input-group"><label>MIN</label><input type="number" id="rngMin" onchange="saveData()"></div>
                    <div class="input-group"><label>MAX</label><input type="number" id="rngMax" onchange="saveData()"></div>
                    <div class="input-group"><label>COUNT <span class="badge-small" id="rngLimitWarning">MAX 200</span></label><input type="number" id="rngCount" min="1" max="20" onchange="saveData()"></div>
                </div>
                <div class="rng-controls-row">
                    <label class="brutal-checkbox" title="抽取的结果绝对不会出现重复数字">
                        <input type="checkbox" id="rngUnique" onchange="saveData()"> 绝对唯一 (Unique)
                    </label>
                </div>
                <button class="btn-action" id="rngBtn" onclick="executeRNG()">GENERATE NUMBERS</button>
                <div class="rng-results" id="rngResults"></div>
            </div>

            <!-- WHEEL MODULE -->
            <div id="wheelTab" class="card">
                <div class="wheel-layout">
                    <div class="wheel-render">
                        <div class="wheel-box">
                            <canvas id="wheelCanvas"></canvas>
                            <button class="wheel-center-btn" id="wheelBtn" onclick="executeWheel()">SPIN</button>
                            <div class="wheel-pointer"></div>
                            <div id="wheelResultStamp" class="wheel-result-stamp"></div>
                        </div>
                    </div>
                    <div class="wheel-setup">
                        <div class="input-group" style="margin-bottom:0; height:100%;">
                            <div class="label-row" style="margin-bottom: 8px;">
                                <label>OPTIONS <span class="badge-small">支持权重</span></label>
                                <label class="brutal-checkbox" title="停下后，中奖项将自动从列表中删除">
                                    <input type="checkbox" id="wheelAutoRemove" onchange="saveData()"> 抽中剔除
                                </label>
                            </div>
                            <textarea id="wheelInput" oninput="debounceDrawWheel()"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sidebar Receipt -->
        <div class="sidebar">
            <div class="receipt-wrapper">
                <div class="receipt-tear-box" id="receiptTearBox">
                    <div class="receipt-inner" id="receiptInner">
                        <div class="receipt-container receipt-front" id="receiptBoxFront">
                            <div class="receipt-header">
                                <button class="icon-btn" style="border:none; box-shadow:none; visibility:hidden;">📊</button>
                                <div class="receipt-title-box"><div class="receipt-icon">🧾</div><div class="receipt-title">RNG RECORD</div><div class="receipt-sub"># <span id="recordDate"></span></div></div>
                                <button class="icon-btn" onclick="flipReceipt(true)" title="查看数据统计">📊</button>
                            </div>
                            <div class="receipt-list" id="historyList"></div>
                            <div class="receipt-footer"><div class="barcode"></div><div class="receipt-sub">VERIFIED RANDOMNESS</div></div>
                        </div>
                        <div class="receipt-container receipt-back" id="receiptBoxBack">
                            <div class="receipt-header" style="border-bottom-color:var(--bg-color);">
                                <button class="icon-btn" onclick="flipReceipt(false)" style="background:var(--bg-color); color:var(--text-main);">🔙</button>
                                <div class="receipt-title-box"><div class="receipt-icon">📈</div><div class="receipt-title">DATA INSIGHTS</div></div>
                                <button class="icon-btn" style="border:none; box-shadow:none; visibility:hidden;">🔙</button>
                            </div>
                            <div class="receipt-list" id="statsList"></div>
                            <div class="receipt-footer" style="border-top-color:var(--bg-color);"><div class="barcode"></div><div class="receipt-sub" style="color:var(--bg-color);">DATA DOES NOT LIE</div></div>
                        </div>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="ghost-btn" onclick="shareReceipt()">📤 分享小票</button>
                    <button class="ghost-btn" onclick="tearReceipt()" style="color:#FF3366; border-color:#FF3366;">🗑 撕毁清空</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast"><span id="toastMsg" style="color:var(--bg-color)"></span><div id="toastActionContainer"></div></div>
    <div class="confetti-container" id="confettiBox"></div>

    <script>
        // ================= Theme Switcher Engine =================
        const THEMES =['cyber', 'retro', 'pastel'];
        const THEME_LABELS = { 'cyber': '⚡ 赛博酸性', 'retro': '📻 复古印刷', 'pastel': '🍵 柔和薄荷' };

        function cycleTheme() {
            let current = document.body.getAttribute('data-theme') || 'cyber';
            let nextIdx = (THEMES.indexOf(current) + 1) % THEMES.length; 
            let nextTheme = THEMES[nextIdx];
            document.body.setAttribute('data-theme', nextTheme); 
            localStorage.setItem('neoTheme', nextTheme);
            triggerVibrate(10); 
            showToast(`主题已切换: ${THEME_LABELS[nextTheme]}`);
            updateRngVisuals();
            setTimeout(drawWheel, 50); 
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-theme');
            let isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('neoDarkMode', isDark ? 'dark' : 'light');
            triggerVibrate(10); 
            showToast(isDark ? '已切换至深色模式' : '已切换至浅色模式');
            updateRngVisuals();
            setTimeout(drawWheel, 50); 
        }

        // ================= Config, Persistence & Settings =================
        const RNG_MODES = ['randomorg', 'drand', 'local'];
        const RNG_LABELS = { 'randomorg': 'RANDOM.ORG', 'drand': 'CF DRAND', 'local': 'LOCAL RNG' };
        let currentRngMode = 'randomorg'; 

        let isMuted = false; 
        let wheelItemsData =[]; 
        const defaultData = { coinHead: "YES", coinTail: "NO", rngMin: 1, rngMax: 100, rngCount: 1, rngUnique: false, wheelInput: "霸王茶姬 x2\n瑞幸咖啡\n喜茶\n回家做饭 x3", wheelAutoRemove: false, history:[] };

        function toggleMute() {
            isMuted = !isMuted; 
            document.getElementById('muteBtn').innerText = isMuted ? '🔕' : '🔔';
            localStorage.setItem('neoMute', isMuted); 
            triggerVibrate(10); 
            showToast(isMuted ? '已全局静音' : '声音与震动已开启');
        }

        function toggleMode() {
            let nextIdx = (RNG_MODES.indexOf(currentRngMode) + 1) % RNG_MODES.length;
            currentRngMode = RNG_MODES[nextIdx];
            localStorage.setItem('neoRngMode', currentRngMode);
            triggerVibrate(10); 
            updateRngVisuals();
        }

        function updateRngVisuals() {
            document.getElementById('modeText').innerText = RNG_LABELS[currentRngMode];
            let dot = document.getElementById('modeDot');
            if (currentRngMode === 'randomorg') {
                dot.style.background = 'var(--accent-main)';
            } else if (currentRngMode === 'drand') {
                dot.style.background = 'var(--accent-sub)';
            } else {
                dot.style.background = 'var(--gray-light)';
            }
            
            let countInp = document.getElementById('rngCount'); 
            if (currentRngMode !== 'local') { 
                countInp.max = 200; 
                if(parseInt(countInp.value) > 200) countInp.value = 200; 
            } else { 
                countInp.removeAttribute('max'); 
            }
        }
        
        function loadData() {
            let savedTheme = localStorage.getItem('neoTheme') || 'cyber'; 
            document.body.setAttribute('data-theme', savedTheme);
            if(localStorage.getItem('neoDarkMode') === 'dark') document.body.classList.add('dark-theme');
            if(localStorage.getItem('neoMute') === 'true') { isMuted = true; document.getElementById('muteBtn').innerText = '🔕'; }
            
            let savedRngMode = localStorage.getItem('neoRngMode');
            if (!savedRngMode && localStorage.getItem('neoTrueRng') === 'false') savedRngMode = 'local';
            currentRngMode = RNG_MODES.includes(savedRngMode) ? savedRngMode : 'randomorg';
            updateRngVisuals();

            let saved = JSON.parse(localStorage.getItem('neoRngData') || 'null'); 
            const data = saved || defaultData;
            document.getElementById('coinHeadInput').value = data.coinHead; 
            document.getElementById('coinTailInput').value = data.coinTail;
            document.getElementById('rngMin').value = data.rngMin; 
            document.getElementById('rngMax').value = data.rngMax; 
            document.getElementById('rngCount').value = data.rngCount;
            document.getElementById('rngUnique').checked = !!data.rngUnique;
            document.getElementById('wheelInput').value = data.wheelInput; 
            document.getElementById('wheelAutoRemove').checked = !!data.wheelAutoRemove;
            
            updateCoinText(); 
            document.getElementById('recordDate').innerText = new Date().toLocaleDateString();
            if(data.history && data.history.length) data.history.forEach(h => renderHistoryDOM(h.type, h.res, h.time));
        }

        function saveData() {
            const historyNodes = Array.from(document.getElementById('historyList').children);
            const history = historyNodes.map(n => ({ 
                time: n.querySelector('.receipt-val').innerText, 
                type: n.querySelectorAll('.receipt-val')[1].innerText, 
                res: n.querySelectorAll('.receipt-val')[2].innerText 
            })).reverse(); 
            
            const data = { 
                coinHead: document.getElementById('coinHeadInput').value, 
                coinTail: document.getElementById('coinTailInput').value, 
                rngMin: document.getElementById('rngMin').value, 
                rngMax: document.getElementById('rngMax').value, 
                rngCount: document.getElementById('rngCount').value, 
                rngUnique: document.getElementById('rngUnique').checked,
                wheelInput: document.getElementById('wheelInput').value, 
                wheelAutoRemove: document.getElementById('wheelAutoRemove').checked,
                history: history 
            };
            localStorage.setItem('neoRngData', JSON.stringify(data));
        }

        // ================= Audio & Haptics =================
        let audioCtx = null; 
        let audioUnlocked = false;

        function unlockBrowserFeatures() {
            if (audioUnlocked) return; 
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) { 
                audioCtx = new AudioContext(); 
                const osc = audioCtx.createOscillator(); 
                const gain = audioCtx.createGain(); 
                gain.gain.value = 0; 
                osc.connect(gain); 
                gain.connect(audioCtx.destination); 
                osc.start(0); 
                osc.stop(audioCtx.currentTime + 0.01); 
                audioUnlocked = true; 
            }
            if (!isMuted) {
                try { if ('vibrate' in navigator) navigator.vibrate(1); } catch(e) {}
            }
            const events = ['touchstart', 'mousedown', 'keydown'];
            events.forEach(evt => document.body.removeEventListener(evt, unlockBrowserFeatures));
        }
        
        const unlockEvents = ['touchstart', 'mousedown', 'keydown'];
        unlockEvents.forEach(evt => document.body.addEventListener(evt, unlockBrowserFeatures, {once: true}));

        function triggerVibrate(pattern) { 
            if (!isMuted) {
                try { if ('vibrate' in navigator) navigator.vibrate(pattern); } catch(e) {}
            }
        }

        function playSound(type) {
            if(isMuted || !audioCtx) return; 
            if(audioCtx.state === 'suspended') audioCtx.resume(); 
            const t = audioCtx.currentTime;
            
            if (type === 'tick') {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain(); 
                osc.type = 'triangle'; osc.frequency.setValueAtTime(1000, t); osc.frequency.exponentialRampToValueAtTime(100, t + 0.05); 
                gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05); 
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(t); osc.stop(t + 0.05); 
                triggerVibrate(10);
            } else if (type === 'ding') {
                let osc1 = audioCtx.createOscillator(); let gain1 = audioCtx.createGain(); 
                osc1.type = 'sine'; osc1.frequency.setValueAtTime(1400, t); gain1.gain.setValueAtTime(0.6, t); gain1.gain.exponentialRampToValueAtTime(0.001, t + 0.8); 
                osc1.connect(gain1); gain1.connect(audioCtx.destination); osc1.start(t); osc1.stop(t + 0.8);
                
                let osc2 = audioCtx.createOscillator(); let gain2 = audioCtx.createGain(); 
                osc2.type = 'sine'; osc2.frequency.setValueAtTime(2800, t); gain2.gain.setValueAtTime(0.2, t); gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.3); 
                osc2.connect(gain2); gain2.connect(audioCtx.destination); osc2.start(t); osc2.stop(t + 0.3); 
                triggerVibrate([30, 50, 30]);
            } else if (type === 'swoosh') {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain(); 
                osc.type = 'triangle'; osc.frequency.setValueAtTime(300, t); osc.frequency.exponentialRampToValueAtTime(50, t + 0.15); 
                gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(0.1, t + 0.05); gain.gain.linearRampToValueAtTime(0, t + 0.15); 
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(t); osc.stop(t + 0.15);
            } else if (type === 'tear') {
                const bufferSize = audioCtx.sampleRate * 0.3; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate); 
                const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1; 
                const noise = audioCtx.createBufferSource(); noise.buffer = buffer; 
                const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 1200; 
                const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.8, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3); 
                noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); noise.start(t);
            } else if (type === 'siren') {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain(); 
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, t); 
                osc.frequency.linearRampToValueAtTime(800, t + 0.4); osc.frequency.linearRampToValueAtTime(400, t + 0.8); 
                osc.frequency.linearRampToValueAtTime(800, t + 1.2); osc.frequency.linearRampToValueAtTime(400, t + 1.6); 
                gain.gain.setValueAtTime(0.3, t); gain.gain.linearRampToValueAtTime(0, t + 1.6); 
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(t); osc.stop(t + 1.6); 
                triggerVibrate([100, 100, 100, 100, 100]);
            }
        }

        // ================= Smart Sleep Physics Engine =================
        const animEngine = { 
            isRendering: false, 
            coin: { state: 'idle', angle: 0, y: 0, rx: 0, speed: 0, target: 0, lastSwooshAngle: 0, isEdge: false, dom: null }, 
            wheel: { state: 'idle', angle: 0, speed: 0, target: 0, dom: null, lastTickIdx: -1, bannerTimer: null } 
        };

        function startRenderLoop() { 
            if (!animEngine.isRendering) { 
                animEngine.isRendering = true; 
                requestAnimationFrame(renderLoop); 
            } 
        }

        function renderLoop() {
            let activeTasks = 0;
            
            // Coin Render
            if (animEngine.coin.state !== 'idle' || Math.abs(animEngine.coin.rx) > 0.5) {
                activeTasks++; 
                const c = animEngine.coin;
                if (c.state === 'spinning') { 
                    c.speed = Math.min(c.speed + 1.5, 40); 
                    c.angle += c.speed; 
                    c.y = Math.max(c.y - 4, -80); 
                    if (c.angle - c.lastSwooshAngle >= 180) { 
                        playSound('swoosh'); 
                        c.lastSwooshAngle += 180; 
                    } 
                } else if (c.state === 'stopping') {
                    let diff = c.target - c.angle; 
                    c.y = Math.min(c.y + 4, 0); 
                    if (diff > 20) { 
                        c.speed = Math.max(diff * 0.04, 2); 
                        c.angle += c.speed; 
                    } else {
                        c.speed += diff * 0.2; 
                        c.speed *= 0.75; 
                        c.angle += c.speed;
                        if (Math.abs(diff) < 0.1 && Math.abs(c.speed) < 0.1 && c.y === 0) {
                            c.angle = c.target; 
                            c.state = 'idle';
                            if(c.isEdge) { 
                                playSound('siren'); 
                                document.body.classList.add('emergency-mode'); 
                                setTimeout(() => document.body.classList.remove('emergency-mode'), 3000); 
                            } else { 
                                playSound('ding'); 
                                fireConfetti(); 
                            }
                            document.getElementById('coinBtn').disabled = false; 
                            addHistory('COIN FLIP', c.resultText);
                        }
                    }
                }
                let targetRx = (c.isEdge && c.state === 'idle') ? -25 : 0; 
                c.rx += (targetRx - c.rx) * 0.1; 
                if(Math.abs(targetRx - c.rx) < 0.5) c.rx = targetRx;
                
                c.dom.style.transform = `translateY(${c.y}px) rotateX(${c.rx}deg) rotateY(${c.angle}deg)`;
                
                let shadowScale = 1 - (c.y / -80) * 0.4; 
                document.getElementById('coinShadow').style.transform = `scale(${shadowScale})`;
                document.getElementById('coinShadow').style.opacity = shadowScale;
            }

            // Wheel Render
            if (animEngine.wheel.state !== 'idle') {
                activeTasks++; 
                const w = animEngine.wheel;
                if (w.state === 'spinning') { 
                    w.speed = Math.min(w.speed + 0.4, 25); 
                    w.angle += w.speed; 
                } else if (w.state === 'stopping') {
                    let diff = w.target - w.angle;
                    if (diff > 15) { 
                        w.speed = Math.max(diff * 0.025, 2.5); 
                        w.angle += w.speed; 
                    } else {
                        w.speed += diff * 0.15; 
                        w.speed *= 0.82; 
                        w.angle += w.speed;
                        if (Math.abs(diff) < 0.1 && Math.abs(w.speed) < 0.1) { 
                            w.angle = w.target; 
                            w.state = 'idle'; 
                            playSound('ding'); 
                            fireConfetti(); 
                            document.getElementById('wheelBtn').disabled = false; 
                            
                            const stamp = document.getElementById('wheelResultStamp');
                            stamp.innerText = w.resultText; 
                            stamp.classList.add('show');
                            clearTimeout(animEngine.wheel.bannerTimer);
                            animEngine.wheel.bannerTimer = setTimeout(() => stamp.classList.remove('show'), 4000);

                            const isAutoRemove = document.getElementById('wheelAutoRemove').checked;
                            addHistory('SPIN WHEEL', w.resultText, () => { 
                                if (isAutoRemove) { setTimeout(() => eliminateItem(w.resultText, true), 400); } 
                            }); 
                        }
                    }
                }
                w.dom.style.transform = `rotate(${w.angle}deg)`;
                
                if (wheelItemsData.length > 0) {
                    let totalWeight = wheelItemsData.reduce((s, i) => s + i.weight, 0); 
                    let pointerCanvasAngle = (360 - (w.angle % 360)) % 360; 
                    let currAng = 0; 
                    let currentIdx = 0;
                    for (let i=0; i<wheelItemsData.length; i++) { 
                        let span = (wheelItemsData[i].weight / totalWeight) * 360; 
                        if (pointerCanvasAngle >= currAng && pointerCanvasAngle < currAng + span) { 
                            currentIdx = i; 
                            break; 
                        } 
                        currAng += span; 
                    }
                    if (w.lastTickIdx !== currentIdx) { 
                        playSound('tick'); 
                        w.lastTickIdx = currentIdx; 
                    }
                }
            }

            if (activeTasks === 0) { 
                animEngine.isRendering = false; 
                return; 
            } 
            requestAnimationFrame(renderLoop);
        }

        window.onload = () => {
            loadData();
            animEngine.coin.dom = document.getElementById('coinElement'); 
            animEngine.wheel.dom = document.getElementById('wheelCanvas');
            for(let i= -7; i<= 7; i++) { 
                if(i === 0) continue; 
                let layer = document.createElement('div'); 
                layer.className = 'coin-edge-layer'; 
                layer.style.transform = `translateZ(${i}px)`; 
                animEngine.coin.dom.appendChild(layer); 
            }
            drawWheel();
        };

        // ================= Swipe Gestures =================
        const tabsArr = ['coin', 'rng', 'wheel']; 
        let currentTabIndex = 0; 
        let touchStartX = 0; let touchEndX = 0; 
        let touchStartY = 0; let touchEndY = 0;
        
        document.getElementById('swipeArea').addEventListener('touchstart', e => { 
            touchStartX = e.changedTouches[0].screenX; 
            touchStartY = e.changedTouches[0].screenY; 
        }, {passive: true});
        
        document.getElementById('swipeArea').addEventListener('touchend', e => { 
            touchEndX = e.changedTouches[0].screenX; 
            touchEndY = e.changedTouches[0].screenY; 
            handleSwipe(); 
        }, {passive: true});

        function handleSwipe() {
            const deltaX = touchEndX - touchStartX; 
            const deltaY = touchEndY - touchStartY; 
            const threshold = 60; 
            if (Math.abs(deltaX) > Math.abs(deltaY) * 1.5 && Math.abs(deltaX) > threshold) {
                if (deltaX < 0 && currentTabIndex < tabsArr.length - 1) { 
                    switchTab(tabsArr[currentTabIndex + 1], currentTabIndex + 1); 
                } else if (deltaX > 0 && currentTabIndex > 0) { 
                    switchTab(tabsArr[currentTabIndex - 1], currentTabIndex - 1); 
                }
            }
        }

        function switchTab(tabId, index, btnDom = null) {
            currentTabIndex = index; 
            document.querySelectorAll('.card').forEach(el => el.classList.remove('active')); 
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId + 'Tab').classList.add('active'); 
            const btn = btnDom || document.querySelectorAll('.tab-btn')[index]; 
            btn.classList.add('active');
            if(tabId === 'wheel') drawWheel(); 
            btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }); 
            triggerVibrate(10);
        }

        // ================= Action Logic =================
        let toastTimer;
        function showToast(msg, actionHtml = "") {
            clearTimeout(toastTimer); 
            const toast = document.getElementById('toast'); 
            document.getElementById('toastMsg').innerHTML = msg; 
            document.getElementById('toastActionContainer').innerHTML = actionHtml;
            toast.classList.add('show'); 
            toastTimer = setTimeout(() => toast.classList.remove('show'), actionHtml ? 6000 : 3000);
        }

        function eliminateItem(itemText, silent = false) { 
            let lines = document.getElementById('wheelInput').value.split('\n'); 
            let newLines = lines.filter(l => l.replace(/(?:\s*[x*]\s*\d+)?$/, '').trim() !== itemText); 
            document.getElementById('wheelInput').value = newLines.join('\n'); 
            drawWheel(); 
            saveData(); 
            triggerVibrate([20, 20]); 
            if(!silent) document.getElementById('toast').classList.remove('show'); 
            else showToast(`已自动剔除 [${itemText}]`);
        }

        function tearReceipt() {
            const tearBox = document.getElementById('receiptTearBox'); 
            const inner = document.getElementById('receiptInner');
            if(document.getElementById('historyList').children.length === 0) return showToast("小票已是空白");
            triggerVibrate([50, 50, 50]); 
            playSound('tear'); 
            tearBox.classList.add('tearing');
            setTimeout(() => { 
                document.getElementById('historyList').innerHTML = ''; 
                if(inner.classList.contains('flipped')) flipReceipt(false); 
                tearBox.classList.remove('tearing'); 
                saveData(); 
            }, 800);
        }

        function shareReceipt() {
            const nodes = document.getElementById('historyList').children; 
            if (nodes.length === 0) return showToast("暂无记录可分享");
            let shareText = "🧾 命运小票 (NEO RNG)\n" + "=".repeat(20) + "\n";
            Array.from(nodes).forEach(n => { 
                let time = n.querySelector('.receipt-val').innerText; 
                let type = n.querySelectorAll('.receipt-val')[1].innerText; 
                let res = n.querySelectorAll('.receipt-val')[2].innerText; 
                shareText += `[${time}] ${type}\n👉 结果: ${res}\n${"-".repeat(20)}\n`; 
            }); 
            shareText += "Powered by Math & True RNG";
            if (navigator.share) { 
                navigator.share({ title: 'NEO RNG 小票记录', text: shareText }).catch(console.error); 
            } else { 
                navigator.clipboard.writeText(shareText).then(() => showToast("记录已复制到剪贴板")); 
            }
        }

        function addHistory(type, resultStr, callback = null) { 
            const time = new Date().toLocaleTimeString([], {hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit'}); 
            renderHistoryDOM(type, resultStr, time); 
            saveData(); 
            if(callback) callback(); 
        }

        function renderHistoryDOM(type, res, time) {
            const list = document.getElementById('historyList'); 
            const item = document.createElement('div'); 
            item.className = 'receipt-item';
            let resStyle = res.includes('EDGE') ? `background:#FF3366;color:#FFF;border-color:#FF3366;` : `background:var(--accent-main);color:var(--btn-text);`;
            item.innerHTML = `<div class="receipt-row"><span class="receipt-label">TIME</span><span class="receipt-val" style="color:var(--text-muted)">${time}</span></div><div class="receipt-row"><span class="receipt-label">TYPE</span><span class="receipt-val">${type}</span></div><div class="receipt-row"><span class="receipt-label">RESULT</span><span class="receipt-val" style="font-size:14px; padding:0 4px; border-radius:4px; border:1px solid var(--border-main); ${resStyle}">${res}</span></div>`;
            list.prepend(item); 
            if (list.children.length > 30) list.lastChild.remove();
        }

        function flipReceipt(toBack) { 
            triggerVibrate(10); 
            playSound('swoosh'); 
            const inner = document.getElementById('receiptInner'); 
            if (toBack) { 
                inner.classList.add('flipped'); 
                renderStats(); 
            } else { 
                inner.classList.remove('flipped'); 
            } 
        }

        function renderStats() {
            const history = JSON.parse(localStorage.getItem('neoRngData') || '{}').history ||[];
            let coinH = 0, coinT = 0, coinE = 0; 
            let wheelDict = {}; 
            let headTxt = document.getElementById('coinHeadInput').value; 
            let tailTxt = document.getElementById('coinTailInput').value;
            
            history.forEach(item => { 
                if (item.type === 'COIN FLIP') { 
                    if (item.res === headTxt) coinH++; else if (item.res === tailTxt) coinT++; else coinE++; 
                } else if (item.type === 'SPIN WHEEL') { 
                    wheelDict[item.res] = (wheelDict[item.res] || 0) + 1; 
                } 
            });
            
            let totalCoin = coinH + coinT + coinE || 1;
            let html = `<div class="stat-section"><h4>🪙 COIN FLIPS</h4><div class="stat-bar-row"><span class="stat-bar-label">HEADS</span><div class="stat-bar-track"><div class="stat-bar-fill" style="width:${(coinH/totalCoin)*100}%"></div></div><span class="stat-bar-val">${coinH}</span></div><div class="stat-bar-row"><span class="stat-bar-label">TAILS</span><div class="stat-bar-track"><div class="stat-bar-fill" style="width:${(coinT/totalCoin)*100}%"></div></div><span class="stat-bar-val">${coinT}</span></div>${coinE > 0 ? `<div class="stat-bar-row"><span class="stat-bar-label" style="color:#FF3366">EDGE</span><div class="stat-bar-track"><div class="stat-bar-fill" style="background:#FF3366; width:${(coinE/totalCoin)*100}%"></div></div><span class="stat-bar-val" style="color:#FF3366">${coinE}</span></div>` : ''}</div>`;
            
            let sortedWheel = Object.entries(wheelDict).sort((a,b)=>b[1]-a[1]).slice(0, 3);
            if (sortedWheel.length > 0) { 
                let maxW = sortedWheel[0][1]; 
                html += `<div class="stat-section"><h4>🎡 TOP WHEEL PICKS</h4>`; 
                sortedWheel.forEach(w => { 
                    html += `<div class="stat-bar-row"><span class="stat-bar-label">${w[0]}</span><div class="stat-bar-track"><div class="stat-bar-fill" style="width:${(w[1]/maxW)*100}%"></div></div><span class="stat-bar-val">${w[1]}</span></div>`; 
                }); 
                html += `</div>`; 
            } else { 
                html += `<div style="text-align:center;color:var(--bg-color);margin-top:20px;font-weight:700;">NO WHEEL DATA</div>`; 
            }
            
            document.getElementById('statsList').innerHTML = html; 
            setTimeout(() => { document.querySelectorAll('.stat-bar-fill').forEach(el => { el.style.width = el.style.width; }); }, 50);
        }

        // ================= Core API & UNIQUE Generator Logic =================
        let drandLastRound = 0;
        let drandNonce = 0;

        async function fetchRandom(min, max, count = 1, unique = false) {
            if (unique && (max - min + 1 < count)) { 
                showToast("🔴 错误：生成区间过小，无法满足不重复条件！"); 
                throw new Error("Range too small"); 
            }

            // 1. LOCAL MATH 模式
            if (currentRngMode === 'local') {
                return new Promise(resolve => {
                    setTimeout(() => {
                        let results =[];
                        let set = new Set();
                        let attempts = 0;
                        while ((unique ? set.size : results.length) < count && attempts < 100000) {
                            let num = Math.floor(Math.random() * (max - min + 1)) + min;
                            if (unique) set.add(num); else results.push(num);
                            attempts++;
                        }
                        resolve(unique ? Array.from(set) : results);
                    }, 300);
                });
            }

            // 2. CLOUDFLARE DRAND 模式 (Web Crypto API Hash Derivation)
            if (currentRngMode === 'drand') {
                try {
                    // 安全环境校验：HTTP 或非 localhost 环境无法使用 Web Crypto API
                    if (!window.crypto || !window.crypto.subtle) {
                        throw new Error("HTTP 非安全环境，无法启用加密 API。");
                    }
                    const controller = new AbortController(); 
                    const timeoutId = setTimeout(() => controller.abort(), 4000);
                    const response = await fetch(`https://drand.cloudflare.com/public/latest`, { signal: controller.signal });
                    clearTimeout(timeoutId); 
                    if (!response.ok) throw new Error("Drand API Limit");
                    
                    const data = await response.json(); 
                    const hex = data.randomness;

                    // 防碰撞：同一秒多次请求时增加 Nonce 偏移量
                    if (data.round === drandLastRound) { drandNonce += 100; } else { drandLastRound = data.round; drandNonce = 0; }

                    const encoder = new TextEncoder(); 
                    let results =[]; 
                    let set = new Set(); 
                    let index = 0;
                    
                    while ((unique ? set.size : results.length) < count && index < 100000) {
                        const dataToHash = encoder.encode(hex + "_" + (drandNonce + index).toString());
                        const hashBuffer = await crypto.subtle.digest('SHA-256', dataToHash);
                        const hashArray = new Uint32Array(hashBuffer);
                        const randomFloat = hashArray[0] / (0xFFFFFFFF + 1);
                        const num = Math.floor(randomFloat * (max - min + 1)) + min;
                        if (unique) set.add(num); else results.push(num);
                        index++;
                    }
                    drandNonce += index;
                    return unique ? Array.from(set) : results;
                } catch (err) {
                    console.warn(err);
                    showToast("DRAND 限制或非安全环境，临时降级本地随机");
                    let results =[];
                    let set = new Set();
                    while ((unique ? set.size : results.length) < count) {
                        let num = Math.floor(Math.random() * (max - min + 1)) + min;
                        if (unique) set.add(num); else results.push(num);
                    }
                    return unique ? Array.from(set) : results;
                }
            }

            // 3. RANDOM.ORG 模式
            try {
                const controller = new AbortController(); 
                const timeoutId = setTimeout(() => controller.abort(), 4000);
                let reqCount = unique ? Math.min(count * 3, 10000) : count;
                const response = await fetch(`https://www.random.org/integers/?num=${reqCount}&min=${min}&max=${max}&col=1&base=10&format=plain&rnd=new`, { signal: controller.signal });
                clearTimeout(timeoutId); 
                if (!response.ok) throw new Error("API Limit");
                
                const text = await response.text();
                const nums = text.trim().split('\n').map(n => parseInt(n, 10)).filter(n => !isNaN(n)); 
                if (!nums.length) throw new Error("Parse Error");
                
                if (unique) {
                    let uniqueNums = Array.from(new Set(nums));
                    if (uniqueNums.length >= count) return uniqueNums.slice(0, count);
                    showToast("API 去重后数量不足，部分由本地补齐");
                    let set = new Set(uniqueNums);
                    while (set.size < count) set.add(Math.floor(Math.random() * (max - min + 1)) + min);
                    return Array.from(set);
                } else {
                    return nums.slice(0, count);
                }
            } catch (err) {
                console.warn(err);
                if (err.message !== "Range too small") showToast("RANDOM.ORG 限制或超时, 降级本地随机");
                let results =[];
                let set = new Set();
                while ((unique ? set.size : results.length) < count) {
                    let num = Math.floor(Math.random() * (max - min + 1)) + min;
                    if (unique) set.add(num); else results.push(num);
                }
                return unique ? Array.from(set) : results;
            }
        }

        function updateCoinText() { 
            document.getElementById('coinFrontText').innerText = document.getElementById('coinHeadInput').value; 
            document.getElementById('coinBackText').innerText = document.getElementById('coinTailInput').value; 
        }

        async function executeCoinFlip() {
            if (animEngine.coin.state !== 'idle') return; 
            unlockBrowserFeatures(); 
            document.getElementById('coinBtn').disabled = true; 
            animEngine.coin.state = 'spinning'; 
            animEngine.coin.lastSwooshAngle = animEngine.coin.angle; 
            startRenderLoop();
            
            const nums = await fetchRandom(1, 1000, 1); 
            let resultType = ''; 
            if (nums[0] <= 495) resultType = 'heads'; else if (nums[0] <= 990) resultType = 'tails'; else resultType = 'edge';
            
            if (resultType === 'edge') { 
                animEngine.coin.resultText = "[SYSTEM ERROR: EDGE LANDING]"; 
                animEngine.coin.isEdge = true; 
                animEngine.coin.target = Math.floor(animEngine.coin.angle / 360) * 360 + 6 * 360 + 90; 
            } else { 
                animEngine.coin.isEdge = false; 
                animEngine.coin.resultText = resultType === 'heads' ? document.getElementById('coinHeadInput').value : document.getElementById('coinTailInput').value; 
                animEngine.coin.target = Math.floor(animEngine.coin.angle / 360) * 360 + 6 * 360 + (resultType === 'heads' ? 0 : 180); 
            }
            animEngine.coin.state = 'stopping';
        }

        async function executeRNG() {
            const btn = document.getElementById('rngBtn'); 
            const resContainer = document.getElementById('rngResults'); 
            let min = parseInt(document.getElementById('rngMin').value); 
            let max = parseInt(document.getElementById('rngMax').value); 
            let count = parseInt(document.getElementById('rngCount').value); 
            let isUnique = document.getElementById('rngUnique').checked;
            
            if (min > max) [min, max] =[max, min]; 
            if (currentRngMode !== 'local' && count > 200) count = 200; 
            if (count < 1) count = 1;
            
            unlockBrowserFeatures(); 
            btn.disabled = true; 
            resContainer.innerHTML = ''; 
            
            try { 
                const nums = await fetchRandom(min, max, count, isUnique); 
                nums.forEach((num, idx) => { 
                    setTimeout(() => { 
                        const el = document.createElement('div'); 
                        el.className = 'rng-number'; 
                        el.innerText = num; 
                        resContainer.appendChild(el); 
                        playSound('tick'); 
                        triggerVibrate(10); 
                    }, idx * 100); 
                }); 
                setTimeout(() => { 
                    btn.disabled = false; 
                    playSound('ding'); 
                    fireConfetti(); 
                    addHistory('GENERATOR', `[${min}-${max}] → ${nums.join(', ')}`); 
                }, nums.length * 100 + 100); 
            } catch (err) { 
                btn.disabled = false; 
            }
        }

        let debounceTimer; 
        function debounceDrawWheel() { 
            clearTimeout(debounceTimer); 
            debounceTimer = setTimeout(() => { drawWheel(); saveData(); }, 300); 
        }

        function drawWheel() {
            const input = document.getElementById('wheelInput').value; 
            let lines = input.split('\n').filter(s => s.trim() !== ''); 
            wheelItemsData = lines.map(line => { 
                let match = line.match(/(.*?)(?:\s*[x*]\s*(\d+))?$/); 
                return { text: match[1].trim(), weight: match[2] ? parseInt(match[2]) : 1 }; 
            });
            
            if (wheelItemsData.length === 0) wheelItemsData =[{ text: 'EMPTY', weight: 1 }];

            const canvas = document.getElementById('wheelCanvas'); 
            const ctx = canvas.getContext('2d'); 
            const size = 320; 
            const dpr = window.devicePixelRatio || 1;
            
            canvas.width = size * dpr; 
            canvas.height = size * dpr; 
            ctx.scale(dpr, dpr); 
            const cx = size / 2; 
            const cy = size / 2; 
            const radius = cx - 3; 
            
            const style = getComputedStyle(document.body);
            const cardBg = style.getPropertyValue('--card-bg').trim(); 
            const accentMain = style.getPropertyValue('--accent-main').trim();
            const bgColor = style.getPropertyValue('--bg-color').trim(); 
            const accentSub = style.getPropertyValue('--accent-sub').trim();
            const strokeCol = style.getPropertyValue('--border-main').trim(); 
            const textMain = style.getPropertyValue('--text-main').trim();
            const btnText = style.getPropertyValue('--btn-text').trim();
            const localColors = [cardBg, accentMain, bgColor, accentSub];

            ctx.clearRect(0, 0, size, size); 
            let totalWeight = wheelItemsData.reduce((s, i) => s + i.weight, 0); 
            let currentAngle = 0;
            
            for (let i = 0; i < wheelItemsData.length; i++) {
                let sliceAngle = (wheelItemsData[i].weight / totalWeight) * (Math.PI * 2); 
                let sliceColor = localColors[i % localColors.length];
                
                ctx.beginPath(); 
                ctx.moveTo(cx, cy); 
                ctx.arc(cx, cy, radius, currentAngle, currentAngle + sliceAngle); 
                ctx.fillStyle = sliceColor; 
                ctx.fill(); 
                ctx.lineWidth = 2.5; 
                ctx.strokeStyle = strokeCol; 
                ctx.stroke();
                
                ctx.save(); 
                ctx.translate(cx, cy); 
                ctx.rotate(currentAngle + sliceAngle / 2); 
                ctx.textAlign = "right"; 
                ctx.textBaseline = "middle"; 
                ctx.fillStyle = (sliceColor === accentMain || sliceColor === accentSub) ? btnText : textMain; 
                ctx.font = '800 15px "Space Grotesk", sans-serif'; 
                let txt = wheelItemsData[i].text + (wheelItemsData[i].weight > 1 ? ` x${wheelItemsData[i].weight}` : '');
                ctx.fillText(txt, radius - 20, 0, radius - 60); 
                ctx.restore(); 
                currentAngle += sliceAngle;
            }
            ctx.beginPath(); 
            ctx.arc(cx, cy, radius, 0, Math.PI * 2); 
            ctx.lineWidth = 5; 
            ctx.strokeStyle = strokeCol; 
            ctx.stroke();
        }

        async function executeWheel() {
            if (animEngine.wheel.state !== 'idle' || wheelItemsData.length === 0) return; 
            unlockBrowserFeatures(); 
            document.getElementById('wheelBtn').disabled = true; 
            animEngine.wheel.state = 'spinning';
            document.getElementById('wheelResultStamp').classList.remove('show'); 
            startRenderLoop();
            
            let totalWeight = wheelItemsData.reduce((s, i) => s + i.weight, 0); 
            const nums = await fetchRandom(1, totalWeight, 1); 
            let targetWeight = nums[0]; 
            
            let currentSum = 0; let winIdx = 0; let startAng = 0; let sliceAng = 0;
            for (let i=0; i<wheelItemsData.length; i++) { 
                currentSum += wheelItemsData[i].weight; 
                sliceAng = (wheelItemsData[i].weight / totalWeight) * 360; 
                if (targetWeight <= currentSum) { winIdx = i; break; } 
                startAng += sliceAng; 
            }
            
            animEngine.wheel.resultText = wheelItemsData[winIdx].text; 
            let centerAngleOfWin = startAng + (sliceAng / 2); 
            let targetMod = 360 - centerAngleOfWin; 
            let extraSpins = 8 * 360; 
            let baseAngle = Math.floor(animEngine.wheel.angle / 360) * 360; 
            animEngine.wheel.target = baseAngle + extraSpins + targetMod; 
            animEngine.wheel.state = 'stopping';
        }
        
        document.addEventListener('keydown', (e) => { 
            if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') { 
                e.preventDefault(); 
                if (document.getElementById('coinTab').classList.contains('active')) executeCoinFlip(); 
                else if (document.getElementById('rngTab').classList.contains('active')) executeRNG(); 
                else if (document.getElementById('wheelTab').classList.contains('active')) executeWheel(); 
            }
        });

        function fireConfetti() {
            const box = document.getElementById('confettiBox'); 
            const style = getComputedStyle(document.body);
            const colors =[
                style.getPropertyValue('--accent-main').trim(), 
                style.getPropertyValue('--accent-sub').trim(), 
                style.getPropertyValue('--text-main').trim(), 
                style.getPropertyValue('--card-bg').trim()
            ];
            
            for (let i=0; i<30; i++) {
                const p = document.createElement('div'); 
                p.className = Math.random() > 0.5 ? 'particle shape-circle' : 'particle'; 
                p.style.width = p.style.height = (Math.random() * 15 + 10) + 'px'; 
                p.style.background = colors[Math.floor(Math.random() * colors.length)]; 
                p.style.left = '50%'; 
                p.style.top = '50%'; 
                box.appendChild(p);
                
                const angle = Math.random() * Math.PI * 2; 
                const velocity = Math.random() * 20 + 5; 
                let vx = Math.cos(angle) * velocity; 
                let vy = Math.sin(angle) * velocity; 
                let rot = 0; let rotSpeed = (Math.random() - 0.5) * 20; 
                let x = 0; let y = 0; let opacity = 1;
                
                function animateParticle() { 
                    vy += 0.5; x += vx; y += vy; rot += rotSpeed; opacity -= 0.02; 
                    p.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) rotate(${rot}deg)`; 
                    p.style.opacity = opacity; 
                    if (opacity > 0) requestAnimationFrame(animateParticle); else p.remove(); 
                } 
                requestAnimationFrame(animateParticle);
            }
        }
    </script>
